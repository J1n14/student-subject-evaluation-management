<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Student Login - Student Subject Evaluation System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="shared/css/style.css" rel="stylesheet" />
</head>
<body>
<div class="auth-wrapper flex-column">
  <div class="text-center text-white mb-4">
    <i class="bi bi-mortarboard-fill" style="font-size:3rem;"></i>
    <h2 class="mt-2 mb-1">Student Subject Evaluation</h2>
    <p class="mb-0 opacity-75">Management System</p>
  </div>
  <div class="card auth-card">
    <div class="card-header">
      <i class="bi bi-person-badge" style="font-size:2rem;"></i>
      <h4 class="mt-2 mb-0">Student Login</h4>
    </div>
    <div class="card-body p-4">
      <form id="student-login-form" class="needs-validation" novalidate>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" required />
          <div class="invalid-feedback">Please enter a valid email.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" class="form-control" id="password" required minlength="6" />
          <div class="invalid-feedback">Password must be at least 6 characters.</div>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="login-btn">
          <span class="spinner-border spinner-border-sm d-none" id="login-spinner"></span>
          Sign In
        </button>
      </form>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared/js/firebase-config.js"></script>
<script src="shared/js/utils.js"></script>
<script src="shared/js/auth.js"></script>
<script>
  auth.onAuthStateChanged(async (user) => {
    if (!user) return;
    const snap = await db.collection("users").doc(user.uid).get();
    if (snap.exists && snap.data().role === "student") {
      window.location.href = "student/html/student-dashboard.html";
    }
  });

  document.getElementById("student-login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    if (!validateForm(form)) return;
    const btn = document.getElementById("login-btn");
    const spinner = document.getElementById("login-spinner");
    btn.disabled = true;
    spinner.classList.remove("d-none");
    try {
      await studentLogin(document.getElementById("email").value.trim(), document.getElementById("password").value);
      window.location.href = "student/html/student-dashboard.html";
    } catch (err) {
      showError(err, "Login failed. Check your credentials.");
      btn.disabled = false;
      spinner.classList.add("d-none");
    }
  });
</script>
</body>
</html>
