<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Program of Studies</title>
<link rel="icon" type="image/png" sizes="64x64" href="../../image/Logo%20transparent.png" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="../../shared/css/style.css?v=3" rel="stylesheet" />
<style>
  @media print {
    /* Hide layout elements when printing */
    .sidebar, 
    .topbar, 
    .btn, 
    #sidebar-toggle, 
    .no-print {
      display: none !important;
    }
    
    body {
      background-color: #ffffff !important;
      color: #000000 !important;
      font-size: 11px !important;
    }
    
    .app-shell {
      display: block !important;
    }
    
    .main-area {
      margin-left: 0 !important;
      padding: 0 !important;
      width: 100% !important;
    }
    
    .content-area {
      padding: 0 !important;
      margin: 0 !important;
    }
    
    .card {
      border: none !important;
      box-shadow: none !important;
      background: transparent !important;
      margin-bottom: 20px !important;
      page-break-inside: avoid;
    }
    
    .card-header {
      background-color: #f8f9fa !important;
      color: #000000 !important;
      border-bottom: 2px solid #333333 !important;
      padding: 5px 0 !important;
    }
    
    .table {
      width: 100% !important;
      border-collapse: collapse !important;
    }
    
    .table th, .table td {
      border: 1px solid #dddddd !important;
      padding: 4px 6px !important;
    }
    
    /* Official document heading styling for print */
    .print-header {
      display: block !important;
      text-align: center;
      margin-bottom: 20px;
    }
  }
  
  /* Screen display for print header (hidden on screen by default) */
  .print-header {
    display: none;
  }
</style>
</head>
<body>
<div id="app-root"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="../../shared/js/firebase-config.js"></script>
<script src="../../shared/js/utils.js"></script>
<script src="../../shared/js/auth.js"></script>
<script src="../../shared/js/layout.js"></script>
<script src="../js/student-pos.js"></script>
<script>
  requireRole("student", (profile) => {
    const content = renderStudentLayout("pos", profile);
    initStudentPOS(content, profile);
  });
</script>
</body>
</html>
