<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin Login - Nexus Integrative University</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
<link href="shared/css/style.css?v=3" rel="stylesheet" />
</head>
<body>
<div class="auth-wrapper flex-column">
  <div class="text-center text-white mb-4">
    <img src="image/Logo%20transparent.png" alt="Nexus Integrative University logo" class="brand-logo" />
    <h2 class="mt-2 mb-1">Nexus Integrative University</h2>
    <p class="mb-0 opacity-75">Student Subject Evaluation System</p>
  </div>
  <div class="card auth-card">
    <div class="card-header">
      <i class="bi bi-shield-lock" style="font-size:2rem;"></i>
      <h4 class="mt-2 mb-0">Admin Login</h4>
    </div>
    <div class="card-body p-4">
      <form id="admin-login-form" class="needs-validation" novalidate>
        <div class="mb-3">
          <label class="form-label">Email address</label>
          <input type="email" class="form-control" id="email" placeholder="e.g. juandelacruz@university.com" required />
          <div class="invalid-feedback">Please enter a valid email, e.g. juandelacruz@university.com.</div>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <input type="password" class="form-control" id="password" required minlength="6" />
            <button class="btn btn-outline-secondary" type="button" onclick="togglePasswordVisibility('password', this)" tabindex="-1">
              <i class="bi bi-eye"></i>
            </button>
            <div class="invalid-feedback">Password must be at least 6 characters.</div>
          </div>
        </div>
        <button type="submit" class="btn btn-primary w-100" id="login-btn">
          <span class="spinner-border spinner-border-sm d-none" id="login-spinner"></span>
          Sign In
        </button>
      </form>
      <div class="text-center mt-3">
        <button type="button" class="btn btn-link btn-sm text-decoration-none p-0" onclick="handleForgotPassword('email')">Forgot password?</button>
      </div>
      <div class="text-center mt-2">
        <a href="index.html" class="small text-decoration-none"><i class="bi bi-arrow-left"></i> Back to home</a>
      </div>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="shared/js/firebase-config.js"></script>
<script src="shared/js/utils.js"></script>
<script src="shared/js/auth.js"></script>
<script>
  auth.onAuthStateChanged(async (user) => {
    if (!user) return;
    const snap = await db.collection("users").doc(user.uid).get();
    if (snap.exists && snap.data().role === "admin") {
      window.location.href = "admin/html/admin-dashboard.html";
    }
  });

  document.getElementById("admin-login-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    const form = e.target;
    if (!validateForm(form)) return;
    const btn = document.getElementById("login-btn");
    const spinner = document.getElementById("login-spinner");
    btn.disabled = true;
    spinner.classList.remove("d-none");
    try {
      await adminLogin(document.getElementById("email").value.trim(), document.getElementById("password").value);
      window.location.href = "admin/html/admin-dashboard.html";
    } catch (err) {
      showError(err, "Login failed. Check your credentials.");
      btn.disabled = false;
      spinner.classList.add("d-none");
    }
  });
</script>
</body>
</html>
